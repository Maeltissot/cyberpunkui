<div class="hack">

  <div class="hud">
    <div>{{ message }}</div>
    <div class="trace">TRACE {{ trace }}/{{ maxTrace }}</div>
  </div>

  <div class="grid">
    <div class="row" *ngFor="let row of grid; let i = index">
      <div
        class="cell"
        *ngFor="let cell of row; let j = index"
        (click)="toggleCell(i, j)"
        [class.selected]="cell.active && showingPattern"
        [class.active]="cell.selected"
        [class.hidden]="!showingPattern && !cell.selected"
      ></div>
    </div>
  </div>

</div>
